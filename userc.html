<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsu Cast - Login</title>
    <style>
        @font-face {font-family: 'Pfont';src: url('assets/fonts/pfont.ttf') format('truetype');}
        :root {
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Pfont', system-ui, -apple-system, sans-serif; 
            background: #0f0f0f url('assets/bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #e5e5e5; 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .card { 
            background: rgba(20, 20, 28, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 400px;
            transition: all 0.3s var(--bounce);
            position: relative;
            animation: slideUp 0.6s var(--bounce);
        }
        
        h1 { margin-top: 0; margin-bottom: 30px; font-weight: 600; color: #fff; }

        input { 
            background: rgba(45, 45, 45, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 14px 16px;
            border-radius: 16px;
            backdrop-filter: blur(25px);
            font-family: 'Pfont', sans-serif;
            font-size: 1rem;
            width: 100%; 
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        input:focus { 
            background: rgba(55, 55, 55, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        button { 
            font-family: 'Pfont', sans-serif;
            width: 100%;
            padding: 14px; 
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; 
            color: #f2f2f2;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s var(--bounce); 
            margin-top: 10px;
        }
        button:hover { 
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02) translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toggle-text {
            margin-top: 25px;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-text:hover { color: #fff; }

        .hidden { display: none !important; }

        .avatar-picker {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .avatar-picker img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            transition: transform 0.2s var(--bounce);
        }
        .avatar-picker img:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }

        /* Fake Spinner Overlay */
        #spinner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a1a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .spinner-svg {
            animation: rotate 2s linear infinite;
            width: 40px;
            height: 40px;
            margin-top: 20px;
        }
        .spinner-svg .path {
            stroke: #fff;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
        
        #error-msg {
            color: #ff5555;
            background: rgba(255, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aws-sdk/2.1386.0/aws-sdk.min.js"></script></head>
<body>

    <div class="card">
        <div id="error-msg" class="hidden"></div>
        
        <!-- LOGIN SECTION -->
        <div id="login-section">
            <h1>Welcome Back</h1>
            <input type="text" id="login-username" placeholder="Username (e.g. samsullah10)">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Log In</button>
            <div class="toggle-text" onclick="toggleMode('register')">Don't have an account? Create one</div>
            <div class="toggle-text" onclick="toggleMode('forgot')" style="margin-top: 10px;">Forgot Password?</div>
        </div>

        <!-- REGISTER SECTION -->
        <div id="register-section" class="hidden">
            <h1>Create Account</h1>
            
            <div class="avatar-picker">
                <img id="avatar-preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23aaa'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" 
                     onclick="document.getElementById('user-icon-input').click()">
                <input type="file" id="user-icon-input" accept="image/*" style="display: none;" onchange="handleIconSelect(event)">
            </div>

            <input type="text" id="reg-username" placeholder="Username (e.g. samsullah10)">
            <input type="text" id="reg-fullname" placeholder="Full Name (e.g. Samsullah)">
            <input type="password" id="reg-password" placeholder="Password (e.g. samsullah10@#)">
            <input type="password" id="reg-confirm-password" placeholder="Confirm Password">
            <input type="text" id="reg-key" placeholder="6-digit Admin Approval Key">
            <button onclick="register()">Create Account</button>
            <div class="toggle-text" onclick="toggleMode('login')">Already have an account? Log in</div>
        </div>

        <!-- FORGOT PASSWORD SECTION -->
        <div id="forgot-password-section" class="hidden">
            <h1>Reset Password</h1>
            <input type="text" id="forgot-username" placeholder="Username">
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="forgot-key" placeholder="Admin Approval Key" style="margin-bottom: 0;">
                <button onclick="requestResetKey()" style="margin-top: 0; width: 120px; font-size: 0.9rem; padding: 10px;">Request</button>
            </div>
            
            <input type="password" id="forgot-new-password" placeholder="New Password">
            <input type="password" id="forgot-confirm-password" placeholder="Confirm Password">
            <button onclick="resetPassword()">Reset Password</button>
            <div class="toggle-text" onclick="toggleMode('login')">Back to Login</div>
        </div>

        <!-- FAKE SPINNER OVERLAY -->
        <div id="spinner-overlay" class="hidden">
            <img id="spinner-avatar" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.2);">
            <div id="spinner-initials" class="hidden" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: white;"></div>
            <h2 id="spinner-name" style="margin-top: 15px; color: #fff;">Logging in...</h2>
            <svg class="spinner-svg" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
        </div>

        <div style="margin-top: 25px; text-align: center;">
            <a href="init.html" style="color: #666; font-size: 0.85rem; text-decoration: none; border-bottom: 1px solid #444; padding-bottom: 2px;">Change Server URL</a>
        </div>
    </div>

    <script>
        const API_URL = localStorage.getItem('samsuServerUrl');
        if (!API_URL) {
            window.location.href = 'init.html';
        }

        let selectedIcon = null;

        function toggleMode(mode) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('forgot-password-section').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');

            if (mode === 'register') {
                document.getElementById('register-section').classList.remove('hidden');
            } else if (mode === 'forgot') {
                document.getElementById('forgot-password-section').classList.remove('hidden');
            } else {
                document.getElementById('login-section').classList.remove('hidden');
            }
        }

        function showError(msg) {
            const errEl = document.getElementById('error-msg');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        }

        function handleIconSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                selectedIcon = event.target.result;
                document.getElementById('avatar-preview').src = selectedIcon;
            };
            reader.readAsDataURL(file);
        }

        async function login() {
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value;
            if(!user || !pass) return showError('Please fill all fields');

            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    showSpinnerAndRedirect(data.user);
                } else {
                    showError(data.error);
                }
            } catch(e) {
                showError('Could not connect to server');
            }
        }

          async function fetchR2Creds() {
              const res = await fetch(`${API_URL}/api/r2-creds`);
              const creds = await res.json();
              AWS.config.update({
                  accessKeyId: creds.accessKeyId,
                  secretAccessKey: creds.secretAccessKey,
                  endpoint: new AWS.Endpoint(creds.endpoint),
                  s3ForcePathStyle: true,
                  signatureVersion: 'v4'
              });
              window.s3 = new AWS.S3();
              window.R2Bucket = creds.bucketName;
          }

          async function uploadAvatarToR2(base64Str, username) {
              if (!window.s3) await fetchR2Creds();
              const base64Data = base64Str.replace(/^data:image\/\w+;base64,/, "");
              const byteCharacters = atob(base64Data);
              const byteNumbers = new Array(byteCharacters.length);
              for (let i = 0; i < byteCharacters.length; i++) {
                  byteNumbers[i] = byteCharacters.charCodeAt(i);
              }
              const byteArray = new Uint8Array(byteNumbers);
              const file = new Blob([byteArray], { type: 'image/png' });
              
              const uniqueName = 'avatars/' + username.replace(/[^a-z0-9_-]/gi, '_').toLowerCase() + '-' + Date.now() + '.png';
              const params = {
                  Bucket: window.R2Bucket,
                  Key: uniqueName,
                  Body: file,
                  ContentType: 'image/png'
              };
              await window.s3.putObject(params).promise();
              return 'r2://' + uniqueName;
          }

          async function register() {
              const user = document.getElementById('reg-username').value.trim();
              const fname = document.getElementById('reg-fullname').value.trim();
              const pass = document.getElementById('reg-password').value;
              const confirmPass = document.getElementById('reg-confirm-password').value;
              const key = document.getElementById('reg-key').value.trim();
  
              if(!user || !fname || !pass || !confirmPass || !key) return showError('Please fill all fields');
              if(pass !== confirmPass) return showError('Passwords do not match');
  
              try {
                  const errEl = document.getElementById('error-msg');
                  errEl.innerText = "Registering...";
                  errEl.style.color = "cyan";
                  errEl.classList.remove('hidden');

                  let finalIconUrl = null;
                  if (selectedIcon) {
                      errEl.innerText = "Uploading avatar to R2...";
                      finalIconUrl = await uploadAvatarToR2(selectedIcon, user);
                      errEl.innerText = "Registering user...";
                  }

                  const res = await fetch(`${API_URL}/api/register`, {
                      method: 'POST',
                      headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify({ 
                          username: user, 
                          fullname: fname, 
                          password: pass, 
                          approvalKey: key, 
                          icon: finalIconUrl 
                      })
                  });
                  const data = await res.json();
                  if (res.ok) {
                      showSpinnerAndRedirect(data.user);
                  } else {
                      errEl.style.color = "#ff4444";
                      showError(data.error);
                  }
              } catch(e) {
                  const errEl = document.getElementById('error-msg');
                  errEl.style.color = "#ff4444";
                  showError('Could not connect to server');
              }
          }

        async function requestResetKey() {
            const user = document.getElementById('forgot-username').value.trim();
            if (!user) return showError('Please enter your username to request a key');
            
            try {
                const res = await fetch(`${API_URL}/api/request-reset`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user })
                });
                if (res.ok) {
                    alert('Request sent! Please ask the admin for your 6-digit reset key.');
                } else {
                    const data = await res.json();
                    showError(data.error || 'Failed to request reset key');
                }
            } catch(e) {
                showError('Could not connect to server');
            }
        }

        async function resetPassword() {
            const user = document.getElementById('forgot-username').value.trim();
            const key = document.getElementById('forgot-key').value.trim();
            const pass = document.getElementById('forgot-new-password').value;
            const confirmPass = document.getElementById('forgot-confirm-password').value;

            if(!user || !key || !pass || !confirmPass) return showError('Please fill all fields');
            if(pass !== confirmPass) return showError('Passwords do not match');

            try {
                const res = await fetch(`${API_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, resetKey: key, newPassword: pass })
                });
                if (res.ok) {
                    alert('Password reset successfully! You can now log in.');
                    toggleMode('login');
                } else {
                    const data = await res.json();
                    showError(data.error || 'Failed to reset password');
                }
            } catch(e) {
                showError('Could not connect to server');
            }
        }

        function showSpinnerAndRedirect(userData) {
            // Save to localStorage
            localStorage.setItem('samsuUser', JSON.stringify(userData));
            
            // Show fake spinner
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');
            
            const spinnerAvatar = document.getElementById('spinner-avatar');
            const spinnerInitials = document.getElementById('spinner-initials');
            if (userData.profileIcon && userData.profileIcon.startsWith('r2://')) {
                spinnerAvatar.classList.add('hidden');
                spinnerInitials.classList.remove('hidden');
                spinnerInitials.innerText = userData.username ? userData.username.charAt(0).toUpperCase() : '?';
                const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#00bcd4', '#009688', '#4caf50', '#ff9800', '#ff5722'];
                const charCode = (userData.username || 'A').charCodeAt(0);
                spinnerInitials.style.backgroundColor = colors[charCode % colors.length];
            } else if (userData.profileIcon) {
                spinnerAvatar.src = `${API_URL}${userData.profileIcon}`;
                spinnerAvatar.classList.remove('hidden');
                spinnerInitials.classList.add('hidden');
            }
            document.getElementById('spinner-name').innerText = `Welcome, ${userData.fullname}`;
            document.getElementById('spinner-overlay').classList.remove('hidden');

            // Redirect after 2s
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }
    </script>
</body>
</html>
